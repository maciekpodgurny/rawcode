---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d %H:%M" }}</time>
      {% if page.tags %}
        <span class="tags">
          {% for tag in page.tags %}<span class="tag">#{{ tag }}</span>{% endfor %}
        </span>
      {% endif %}
    </div>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <p class="back"><a href="{{ '/' | relative_url }}">&lt;-- back</a></p>
</article>
