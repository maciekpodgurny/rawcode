title: rawcode
description: raw thoughts, raw code
url: ""
baseurl: ""

markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
